<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuitionPro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        .container {
            background: #fff;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            text-align: center;
        }
        h1 {
            color: #764ba2;
            margin-bottom: 1rem;
            font-size: 2.5rem;
        }
        p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 2rem;
        }
        .feature {
            padding: 1rem;
            background: #f5f5fa;
            border-radius: 8px;
        }
        .feature h3 {
            color: #667eea;
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }
        .feature p {
            font-size: 0.85rem;
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to TuitionPro</h1>
        <p>A modern platform for managing tuition, students, and learning resources.</p>
        <div class="features">
            <div class="feature">
                <h3>Students</h3>
                <p>Track student progress and attendance.</p>
            </div>
            <div class="feature">
                <h3>Classes</h3>
                <p>Organize schedules and curriculum.</p>
            </div>
            <div class="feature">
                <h3>Payments</h3>
                <p>Handle billing and invoices.</p>
            </div>
        </div>
    </div>
</body>
</html>
